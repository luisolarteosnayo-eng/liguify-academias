<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Academias</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800">
<div class="flex min-h-screen">

  <!-- Overlay del drawer (solo móvil) -->
  <div id="navOverlay" class="hidden fixed inset-0 z-30 bg-slate-900/50 md:hidden" onclick="toggleNav(false)"></div>

  <!-- ===================== SIDEBAR / DRAWER ===================== -->
  <aside id="sidebar"
    class="fixed inset-y-0 left-0 z-40 w-64 -translate-x-full transform bg-slate-900 text-slate-100 transition-transform duration-200
           md:static md:translate-x-0 md:z-auto flex flex-col">
    <div class="px-5 py-5 border-b border-slate-700/60 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🎓</span>
        <div>
          <div class="font-semibold leading-tight">Academias</div>
          <div class="text-xs text-slate-400">Suite Deportiva</div>
        </div>
      </div>
      <button onclick="toggleNav(false)" class="md:hidden text-slate-400 hover:text-white text-2xl leading-none">&times;</button>
    </div>

    <!-- Selector de rol -->
    <div class="px-5 py-3 border-b border-slate-700/60">
      <label class="block text-[11px] uppercase tracking-wide text-slate-400 mb-1">Rol</label>
      <select id="rolSelect" class="w-full bg-slate-800 text-sm rounded-md px-2 py-2 border border-slate-700">
        <option value="admin">Administrador / Director</option>
        <option value="coordinador">Coordinador / Recepción</option>
        <option value="tesorero">Tesorero / Caja</option>
        <option value="profesor">Profesor</option>
      </select>
    </div>

    <!-- Menú (se rellena por JS según rol) -->
    <nav id="nav" class="flex-1 px-3 py-3 space-y-1 text-sm overflow-y-auto"></nav>

    <div class="px-5 py-3 border-t border-slate-700/60">
      <a href="../launcher/index.html" class="text-xs text-slate-400 hover:text-slate-200">← Volver a la suite</a>
    </div>
  </aside>

  <!-- ===================== CONTENIDO ===================== -->
  <main class="flex-1 min-w-0">
    <header class="sticky top-0 z-20 bg-white border-b border-slate-200 px-4 md:px-8 py-3 flex items-center justify-between gap-3">
      <div class="flex items-center gap-2 min-w-0">
        <button onclick="toggleNav(true)" class="md:hidden -ml-1 p-2 rounded-lg hover:bg-slate-100" aria-label="Menú">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 id="pageTitle" class="text-base md:text-lg font-semibold truncate">Dashboard</h1>
      </div>
      <label class="flex items-center gap-1.5 text-sm shrink-0">
        <span class="text-slate-400">📍</span>
        <select id="sedeSelect" class="rounded-md border border-slate-300 px-2 py-1.5 text-sm bg-white font-medium max-w-[8.5rem]"></select>
      </label>
    </header>
    <div id="content" class="p-4 md:p-8"></div>
  </main>
</div>

<!-- Contenedor de modales -->
<div id="modalRoot" class="hidden fixed inset-0 z-50">
  <div class="absolute inset-0 bg-slate-900/50" onclick="closeModal()"></div>
  <div class="absolute inset-0 flex items-start justify-center overflow-y-auto p-3 sm:p-6 md:p-8">
    <div id="modalBox" class="relative w-full max-w-lg rounded-2xl bg-white shadow-xl my-auto">
      <div class="flex items-center justify-between border-b border-slate-200 px-5 md:px-6 py-4 sticky top-0 bg-white rounded-t-2xl">
        <h3 id="modalTitle" class="font-semibold pr-4 truncate"></h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-2xl leading-none shrink-0">&times;</button>
      </div>
      <div id="modalBody" class="px-5 md:px-6 py-5"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 md:left-auto md:right-6 md:translate-x-0 z-[60] rounded-lg bg-slate-900 text-white text-sm px-4 py-3 shadow-lg text-center"></div>

<script src="app.js"></script>
</body>
</html>
